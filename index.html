<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ON3 – Frame‑Tunnel</title>

<style>
body { background:#000; margin:0; }
canvas { display:block; margin:auto; background:#111; }
pre { color:#0f0; font-family:monospace; padding:20px; }
</style>

<script type="module">
import { drawON3 } from "./on3Vis.js";
import { runON3 } from "./on3Engine.js";
import { connectON3 } from "./on3Connect.js";

window.onload = () => {
    const c = document.getElementById("canvasON3");
    const x = c.getContext("2d");

    // ⭐ VISUALISIERUNG
    drawON3(x);

    // ⭐ FRAME
    const frame = {
        context: null,
        repeat: 4,
        fixable: false,
        addr: "0x13",
        event: "on3",
        state: "ACTIVE"
    };

    const result = runON3(frame);
    console.log("ON3‑FRAME:", result);

    // ⭐ VERBINDUNGEN
    console.log("ON3‑CONNECT:", connectON3());

    // ⭐ Ausgabe
    document.getElementById("info").innerText =
        JSON.stringify(result, null, 2);
};
</script>
</head>

<body>
<canvas id="canvasON3" width="600" height="600"></canvas>
<pre id="info"></pre>
</body>
</html>
