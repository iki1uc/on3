<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>IKI1UC – Zentrale Station</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; margin:0; padding:20px; }
h1, h2 { color:#6cf; }
.respo { background:#111; border:1px solid #333; padding:20px; margin:15px 0; }
canvas { display:block; margin:auto; background:#111; }
</style>

<script type="module">
/* VISUAL-MODULE */
import { drawON3 } from "./on3Vis.js";
import { drawRing6 } from "./ring6.js";
import { drawRing7 } from "./on3Ring7.js";
import { animate9lu } from "./9luAnim.js";
import { draw9lu3D } from "./9lu3D.js";

/* ENGINE-MODULE */
import { scanFrame } from "./on3Scanner.js";
import { debugFrame } from "./on3Debugger.js";
import { buildDashboard } from "./on3Dashboard.js";

window.onload = () => {

    /* CANVAS */
    const c = document.getElementById("canvas");
    const x = c.getContext("2d");

    /* VISUALISIERUNG – ALLE MODULE */
    drawRing6(x);     // Meta-Ebene
    drawRing7(x);     // Relativität
    drawON3(x);       // ON3-Tunnel
    animate9lu(x);    // 9lu-Animation
    draw9lu3D(x);     // 9lu-3D

    /* FRAME */
    const frame = {
        context: null,
        repeat: 4,
        fixable: false,
        addr: "0x13",
        event: "on3",
        state: "ACTIVE"
    };

    const scan = scanFrame(frame);
    const debug = debugFrame(frame);

    const result = { scan, debug };

    /* DASHBOARD */
    buildDashboard(result);

    /* RESPO-100 */
    document.getElementById("respo100").innerText =
        "RESPO‑100: TOP 100 Bildung – aktiv";

    /* RESPO-360 */
    document.getElementById("respo360").innerText =
        "RESPO‑360: 360° Bildung – aktiv";

    /* NEXT-STATIONEN */
    document.getElementById("next").innerText =
        "Nächste Stationen: 3te, 9lu, META7, TP9 – alle Module versorgt.";
};
</script>
</head>

<body>

<h1>IKI1UC – Zentrale Station</h1>
<h2>Alle Module aktiv – ON3 verlassen – nächste Stationen sichtbar</h2>

<canvas id="canvas" width="600" height="600"></canvas>

<div id="dashboard" class="respo"></div>

<div id="respo100" class="respo"></div>
<div id="respo360" class="respo"></div>

<div id="next" class="respo"></div>

</body>
</html>
