<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ON3 – Full Visual + Dashboard</title>

<style>
body { background:#000; margin:0; color:#0f0; font-family:monospace; }
canvas { display:block; margin:auto; background:#111; }
.respo { padding:20px; margin:10px; background:#111; border:1px solid #333; }
#dashboard { background:#111; padding:20px; border:1px solid #333; }
</style>

<script type="module">
import { drawON3 } from "./on3Vis.js";
import { drawRing6 } from "./ring6.js";
import { drawRing7 } from "./on3Ring7.js";

import { scanFrame } from "./on3Scanner.js";
import { debugFrame } from "./on3Debugger.js";
import { buildDashboard } from "./on3Dashboard.js";

window.onload = () => {
    const c = document.getElementById("canvasON3");
    const x = c.getContext("2d");

    // ⭐ VISUALISIERUNG
    drawRing6(x);
    drawRing7(x);
    drawON3(x);

    // ⭐ FRAME
    const frame = {
        context: null,
        repeat: 4,
        fixable: false,
        addr: "0x13",
        event: "on3",
        state: "ACTIVE"
    };

    const scan = scanFrame(frame);
    const debug = debugFrame(frame);

    const result = { scan, debug };

    // ⭐ DASHBOARD
    buildDashboard(result);

    // ⭐ RESPO‑100
    document.getElementById("respo100").innerText =
        "RESPO‑100: Bildung – Top 100 aktiv";

    // ⭐ RESPO‑360
    document.getElementById("respo360").innerText =
        "RESPO‑360: Bildung – 360° aktiv";
};
</script>
</head>

<body>

<canvas id="canvasON3" width="600" height="600"></canvas>

<div id="dashboard"></div>

<div id="respo100" class="respo"></div>
<div id="respo360" class="respo"></div>

</body>
</html>
